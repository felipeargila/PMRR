<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braspowertech - Monitoramento PMRR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
        
        .badge { @apply px-2 py-1 rounded-full text-xs font-medium; }
        .badge-executado { @apply bg-green-100 text-green-700; }
        .badge-desenvolvimento { @apply bg-yellow-100 text-yellow-700; }
        .badge-homologacao { @apply bg-purple-100 text-purple-700; }
        .badge-sem-registro { @apply bg-gray-100 text-gray-700; }
        
        .filtro-card {
            @apply bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden mb-4;
        }
        .filtro-header {
            @apply px-4 py-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center cursor-pointer;
        }
        .filtro-header span {
            @apply text-sm font-medium text-gray-700;
        }
        .filtro-content {
            @apply p-4 max-h-60 overflow-y-auto;
        }
        .chip {
            @apply inline-flex items-center bg-blue-100 text-blue-800 text-xs px-3 py-1.5 rounded-full mr-2 mb-2;
        }
        .chip-remover {
            @apply ml-2 text-blue-600 hover:text-blue-800 cursor-pointer;
        }
        .tooltip {
            @apply relative inline-block;
        }
        .tooltip .tooltip-text {
            @apply invisible absolute z-20 bg-gray-900 text-white text-xs rounded-lg py-2 px-3 bottom-full left-1/2 transform -translate-x-1/2 mb-2 whitespace-nowrap shadow-lg;
        }
        .tooltip:hover .tooltip-text {
            @apply visible;
        }
        .filtro-checkbox {
            @apply w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- HEADER MODO ESCURO -->
    <div class="bg-blue-900 border-b border-blue-800 sticky top-0 z-10 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <img src="http://braspowertech.com.br/wp-content/uploads/2023/01/bpt-selo-header_Prancheta-1-1.svg" 
                         alt="Braspowertech" 
                         class="h-10 w-auto"
                         onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 40\'%3E%3Cpath fill=\'%23FFFFFF\' d=\'M20 8L4 32h32L20 8z\'/%3E%3Ctext x=\'45\' y=\'25\' font-family=\'Arial\' font-size=\'20\' font-weight=\'bold\' fill=\'%23FFFFFF\'%3EBRASPOWERTECH%3C/text%3E%3C/svg%3E';">
                    <span class="ml-3 bg-yellow-400 text-blue-900 text-xs px-2 py-1 rounded-full font-bold">821 cidades</span>
                </div>
                <div class="flex items-center">
                    <div class="h-8 w-8 rounded-full bg-yellow-400 flex items-center justify-center">
                        <span class="text-blue-900 font-medium text-sm">D</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BARRA DE BUSCA -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Buscar município, estado..." id="searchInput"
                       class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>
    </div>

    <!-- BOTÃO FILTROS MOBILE -->
    <div class="lg:hidden bg-white px-4 py-3 border-b border-gray-200">
        <button onclick="toggleFiltros()" id="btnToggleFiltros" class="w-full bg-blue-50 text-blue-700 text-sm py-2.5 rounded-lg flex items-center justify-center font-medium">
            <i class="fas fa-sliders-h mr-2"></i> <span id="textoBotaoFiltros">Mostrar filtros</span>
        </button>
    </div>

    <!-- CHIPS DOS FILTROS ATIVOS -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 min-h-[50px]" id="container-chips"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex flex-col lg:flex-row gap-6">
            
            <!-- SIDEBAR FILTROS -->
            <div id="filtrosSidebar" class="lg:w-80 lg:sticky lg:top-24 hidden lg:block" style="max-height: calc(100vh - 120px); overflow-y: auto;">
                
                <!-- FILTRO ESTADO -->
                <div class="filtro-card">
                    <div class="filtro-header" onclick="toggleFiltro('estado')">
                        <span><i class="fas fa-map-pin mr-2 text-blue-500"></i>Estado</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    <div id="filtro-estado-content" class="filtro-content hidden">
                        <input type="text" placeholder="Buscar estado..." class="w-full text-sm p-2 border border-gray-200 rounded-lg mb-3" id="buscaEstado">
                        <div id="opcoes-estado" class="space-y-2"></div>
                    </div>
                </div>
                
                <!-- FILTRO RISCO -->
                <div class="filtro-card">
                    <div class="filtro-header" onclick="toggleFiltro('risco')">
                        <span><i class="fas fa-fire mr-2 text-orange-500"></i>Grau de Risco</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    <div id="filtro-risco-content" class="filtro-content hidden">
                        <div id="opcoes-risco" class="space-y-2"></div>
                    </div>
                </div>
                
                <!-- FILTRO STATUS -->
                <div class="filtro-card">
                    <div class="filtro-header" onclick="toggleFiltro('status')">
                        <span><i class="fas fa-tag mr-2 text-purple-500"></i>Status PMRR</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    <div id="filtro-status-content" class="filtro-content hidden">
                        <div id="opcoes-status" class="space-y-2"></div>
                    </div>
                </div>
                
                <!-- FILTRO TIPO DE RISCO -->
                <div class="filtro-card">
                    <div class="filtro-header" onclick="toggleFiltro('tipo')">
                        <span><i class="fas fa-cloud-rain mr-2 text-blue-500"></i>Tipo de Risco</span>
                        <i class="fas fa-chevron-down text-gray-400"></i>
                    </div>
                    <div id="filtro-tipo-content" class="filtro-content hidden">
                        <input type="text" placeholder="Buscar tipo..." class="w-full text-sm p-2 border border-gray-200 rounded-lg mb-3" id="buscaTipo">
                        <div id="opcoes-tipo" class="space-y-2"></div>
                    </div>
                </div>
                
                <!-- BOTÕES -->
                <div class="flex gap-3 mt-4">
                    <button onclick="aplicarFiltros()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm py-2.5 rounded-lg transition font-medium">
                        <i class="fas fa-check mr-2"></i>Aplicar
                    </button>
                    <button onclick="limparTodosFiltros()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm py-2.5 rounded-lg transition font-medium">
                        Limpar
                    </button>
                </div>
            </div>
            
            <!-- CONTEÚDO PRINCIPAL -->
            <div class="flex-1 min-w-0">
                
                <!-- CARDS RESUMO -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="cards-resumo">
                    <div class="bg-white rounded-xl shadow-sm p-4 card-hover">
                        <div class="text-xs text-gray-500 mb-1">Total</div>
                        <div class="text-2xl font-bold text-gray-900" id="total-municipios">821</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-4 card-hover">
                        <div class="text-xs text-gray-500 mb-1">Risco Alto</div>
                        <div class="text-2xl font-bold text-red-600" id="total-risco-alto">458</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-4 card-hover">
                        <div class="text-xs text-gray-500 mb-1">Sem Registro</div>
                        <div class="text-2xl font-bold text-gray-600" id="total-sem-registro">732</div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-4 card-hover">
                        <div class="text-xs text-gray-500 mb-1">Emergências</div>
                        <div class="text-2xl font-bold text-orange-600" id="total-emergencias">49</div>
                    </div>
                </div>
                
                <!-- GRÁFICOS -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="bg-white rounded-xl shadow-sm p-4">
                        <canvas id="graficoStatus" height="150"></canvas>
                        <div class="text-xs text-center text-gray-500 mt-3" id="legenda-status"></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-4">
                        <canvas id="graficoRisco" height="150"></canvas>
                        <div class="text-xs text-center text-gray-500 mt-3" id="legenda-risco"></div>
                    </div>
                </div>
                
                <!-- MAPA -->
                <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
                    <div id="map" style="height: 280px; border-radius: 0.75rem;"></div>
                </div>
                
                <!-- LISTAGEM -->
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <div class="text-center text-gray-500">
                        Carregando dados...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Script será adicionado depois
        console.log('Dashboard carregada!');
        
        function toggleFiltros() {
            const sidebar = document.getElementById('filtrosSidebar');
            const btn = document.getElementById('textoBotaoFiltros');
            sidebar.classList.toggle('hidden');
            btn.textContent = sidebar.classList.contains('hidden') ? 'Mostrar filtros' : 'Ocultar filtros';
        }
        
        function toggleFiltro(tipo) {
            document.getElementById(`filtro-${tipo}-content`).classList.toggle('hidden');
        }
    </script>
</body>
</html>
